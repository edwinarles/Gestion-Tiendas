# Especificación de Render Blueprint para Despliegue de Excel Store Sync
# Permite crear el Frontend (Static Site) y el Backend (Web Service) enlazados automáticamente.

services:
  # 1. Backend (Servicio Web de FastAPI)
  - type: web
    name: excel-store-sync-backend
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false # El usuario ingresará su URL de PostgreSQL (ej. de Neon) en la consola de Render
      - key: PORT
        value: 10000
      - key: PYTHON_VERSION
        value: 3.11.5

  # 2. Frontend (Sitio Estático de React)
  - type: web
    name: excel-store-sync-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE
        sync: false
